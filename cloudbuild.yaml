options:
    logging: CLOUD_LOGGING_ONLY

steps:
    - name: 'node:22-alpine'
      entrypoint: sh
      args:
          - -c
          - |
              corepack enable
              pnpm install --frozen-lockfile
              pnpm test --run
    - name: 'gcr.io/cloud-builders/docker'
      env:
          - 'DOCKER_BUILDKIT=1'
      args:
          - build
          - -t
          - us-central1-docker.pkg.dev/$PROJECT_ID/tarot-api-container/tarot-api:$COMMIT_SHA
          - .

    - name: 'gcr.io/cloud-builders/docker'
      args:
          - push
          - us-central1-docker.pkg.dev/$PROJECT_ID/tarot-api-container/tarot-api:$COMMIT_SHA

    - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
      entrypoint: gcloud
      args:
          - run
          - deploy
          - tarot-api
          - --image=us-central1-docker.pkg.dev/$PROJECT_ID/tarot-api-container/tarot-api:$COMMIT_SHA
          - --region=us-central1
          - --platform=managed
          - --max-instances=1
          - --allow-unauthenticated
